name: Android Build APK

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Get current date and time
      id: date
      run: echo "datetime=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

    - name: Rename APK
      run: |
        mkdir -p release_apk
        cp app/build/outputs/apk/debug/app-debug.apk release_apk/BantuCepat_${{ steps.date.outputs.datetime }}.apk

    - name: Commit and Push APK to Repo
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add release_apk/
        git commit -m "Upload APK: BantuCepat_${{ steps.date.outputs.datetime }}"
        git push
