name: Android Build APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Get current date and time
      id: date
      run: echo "datetime=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/BantuCepat_${{ steps.date.outputs.datetime }}.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BantuCepat_Build_${{ steps.date.outputs.datetime }}
        path: app/build/outputs/apk/debug/BantuCepat_${{ steps.date.outputs.datetime }}.apk
